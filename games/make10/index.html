<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>メイク10</title>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --red:    #ff4d6d;
      --blue:   #4361ee;
      --yellow: #ffbe0b;
      --green:  #3ece6f;
      --orange: #ff7c38;
      --purple: #9b5de5;
      --bg: linear-gradient(135deg, #fff9f0 0%, #f0f4ff 50%, #f0fff4 100%);
    }

    body {
      font-family: 'Fredoka One', 'Noto Sans JP', sans-serif;
      background: var(--bg);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── SCREENS ── */
    .screen { display: none; min-height: 100vh; }
    .screen.active {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
    }

    /* ── HOME ── */
    .home-logo {
      font-size: clamp(64px, 16vw, 112px);
      line-height: 1;
      text-align: center;
      margin-bottom: 8px;
      text-shadow: 0 6px 0 rgba(0,0,0,0.08);
    }
    .logo-make { color: #ff4d6d; -webkit-text-stroke: 3px #b00025; }
    .logo-10   { color: #ffbe0b; -webkit-text-stroke: 3px #aa6600; }

    .home-sub {
      font-size: 17px;
      color: #666;
      text-align: center;
      margin-bottom: 36px;
      font-family: 'Noto Sans JP', sans-serif;
      font-weight: 400;
    }

    .mode-btns { display: flex; gap: 20px; flex-wrap: wrap; justify-content: center; margin-bottom: 32px; }

    .mode-btn {
      padding: 20px 44px;
      font-size: 22px;
      font-family: 'Fredoka One', sans-serif;
      border: none;
      border-radius: 22px;
      cursor: pointer;
      min-width: 200px;
      transition: transform .1s, box-shadow .1s;
    }
    .mode-btn:active { transform: translateY(5px); }
    .btn-solo { background: linear-gradient(135deg,#ff7b7b,#ff4d6d); color:#fff; box-shadow: 0 7px 0 #b00025; }
    .btn-solo:active  { box-shadow: 0 2px 0 #b00025; }
    .btn-2p   { background: linear-gradient(135deg,#4cc9f0,#4361ee); color:#fff; box-shadow: 0 7px 0 #1a2aaa; }
    .btn-2p:active    { box-shadow: 0 2px 0 #1a2aaa; }

    .hs-display { font-size: 15px; color: #888; font-family:'Noto Sans JP'; text-align:center; }
    .hs-num { font-family:'Fredoka One'; font-size:22px; color:var(--orange); }

    /* ── SETUP ── */
    .setup-title { font-size: 38px; color:#333; margin-bottom:24px; }
    .setup-lbl { font-size:18px; color:#666; margin-bottom:16px; font-family:'Noto Sans JP'; }
    .rounds-row { display:flex; gap:12px; flex-wrap:wrap; justify-content:center; margin-bottom:32px; }

    .rnd-btn {
      width:64px; height:64px; font-size:22px;
      font-family:'Fredoka One'; border:3px solid #ddd;
      border-radius:16px; background:white; cursor:pointer;
      box-shadow: 0 4px 0 #ccc; color:#444; transition:all .15s;
    }
    .rnd-btn.sel {
      background:var(--blue); color:#fff;
      border-color:#2030b0; box-shadow: 0 4px 0 #1a2aaa;
    }

    .start-btn {
      padding:18px 60px; font-size:24px;
      font-family:'Fredoka One'; background:linear-gradient(135deg,#56e89d,#3ece6f);
      color:#fff; border:none; border-radius:22px;
      box-shadow:0 7px 0 #0e7a35; cursor:pointer;
      transition:transform .1s, box-shadow .1s; margin-bottom:14px;
    }
    .start-btn:active { transform:translateY(6px); box-shadow:0 1px 0 #0e7a35; }

    .back-btn {
      padding:12px 32px; font-size:16px; font-family:'Fredoka One';
      background:white; color:#888; border:2px solid #ddd;
      border-radius:12px; cursor:pointer;
    }
    .back-btn:hover { background:#f5f5f5; }

    /* ── SOLO LAYOUT ── */
    #soloScreen { gap:0; padding:16px; }

    .solo-hdr {
      display:flex; align-items:center; justify-content:space-between;
      width:100%; max-width:620px; margin-bottom:18px; gap:10px;
    }

    .timer-box {
      background:linear-gradient(135deg,#ff7b7b,#ff4d6d); color:#fff;
      padding:10px 20px; border-radius:16px; font-size:30px;
      box-shadow:0 5px 0 #b00025; min-width:88px; text-align:center;
    }
    .timer-box.warn   { background:linear-gradient(135deg,#ffc76b,#ff9f43); box-shadow:0 5px 0 #bb5500; }
    .timer-box.danger { background:linear-gradient(135deg,#e74c3c,#c0392b); box-shadow:0 5px 0 #7b0000; animation:shake .5s infinite; }
    @keyframes shake { 0%,100%{transform:rotate(0)} 25%{transform:rotate(-4deg)} 75%{transform:rotate(4deg)} }

    .score-box {
      background:linear-gradient(135deg,#ffe066,#ffbe0b); color:#fff;
      padding:10px 20px; border-radius:16px; font-size:28px;
      box-shadow:0 5px 0 #bb7700; text-align:center;
    }
    .score-lbl { font-size:11px; opacity:.85; display:block; font-family:'Noto Sans JP'; font-weight:400; }

    .home-icon-btn {
      padding:12px 16px; font-size:22px; background:white;
      border:2px solid #ddd; border-radius:14px;
      cursor:pointer; box-shadow:0 3px 0 #ccc;
      transition:transform .1s;
    }
    .home-icon-btn:active { transform:translateY(2px); }

    /* ── NUMBER TILES ── */
    .nums-area { display:flex; gap:14px; margin-bottom:20px; flex-wrap:wrap; justify-content:center; }

    .num-tile {
      width:72px; height:72px; border-radius:18px; font-size:34px;
      color:#fff; display:flex; align-items:center; justify-content:center;
      cursor:pointer; user-select:none; -webkit-user-select:none;
      transition:transform .1s, box-shadow .1s, opacity .2s;
    }
    .num-tile:active { transform:translateY(5px); }
    .num-tile.used   { opacity:.25; pointer-events:none; }

    .num-tile[data-c="0"] { background:linear-gradient(135deg,#ff7b7b,#ff4d6d); box-shadow:0 7px 0 #b00025; }
    .num-tile[data-c="1"] { background:linear-gradient(135deg,#4cc9f0,#4361ee); box-shadow:0 7px 0 #1a2aaa; }
    .num-tile[data-c="2"] { background:linear-gradient(135deg,#ffe066,#ffbe0b); box-shadow:0 7px 0 #aa6600; color:#333; }
    .num-tile[data-c="3"] { background:linear-gradient(135deg,#56e89d,#3ece6f); box-shadow:0 7px 0 #0e7a35; }

    .num-tile[data-c="0"]:active { box-shadow:0 2px 0 #b00025; }
    .num-tile[data-c="1"]:active { box-shadow:0 2px 0 #1a2aaa; }
    .num-tile[data-c="2"]:active { box-shadow:0 2px 0 #aa6600; }
    .num-tile[data-c="3"]:active { box-shadow:0 2px 0 #0e7a35; }

    /* ── EQUATION SLOTS ── */
    .eq-area {
      display:flex; align-items:center; gap:6px;
      margin-bottom:18px; flex-wrap:wrap; justify-content:center;
    }

    .slot {
      width:56px; height:56px; border-radius:14px;
      display:flex; align-items:center; justify-content:center;
      font-size:26px; border:3px solid transparent; transition:all .15s;
    }
    .slot.ns { background:#f0f0f0; border-color:#ddd; }
    .slot.os { background:#e8f4ff; border-color:#b8d8f8; font-size:22px; }

    .slot.active { border-color:var(--blue); animation:slotPulse 1s ease-in-out infinite; }
    .slot.ns.active { background:#deeeff; }
    .slot.os.active { background:#deeeff; }

    @keyframes slotPulse {
      0%,100% { box-shadow:0 0 0 0 rgba(67,97,238,.4); }
      50%      { box-shadow:0 0 0 7px rgba(67,97,238,0); }
    }

    .slot.filled { border-color:transparent; }
    .slot.ns.filled { color:#fff; }
    .slot.ns.filled[data-c="0"] { background:linear-gradient(135deg,#ff7b7b,#ff4d6d); }
    .slot.ns.filled[data-c="1"] { background:linear-gradient(135deg,#4cc9f0,#4361ee); }
    .slot.ns.filled[data-c="2"] { background:linear-gradient(135deg,#ffe066,#ffbe0b); color:#333; }
    .slot.ns.filled[data-c="3"] { background:linear-gradient(135deg,#56e89d,#3ece6f); }
    .slot.os.filled { background:#fff; border-color:#ccc; color:#333; font-weight:700; }

    .eq-equals { font-size:30px; color:#666; padding:0 4px; }

    .eq-result {
      width:64px; height:56px; border-radius:14px;
      background:#f5f5f5; border:3px solid #ddd;
      display:flex; align-items:center; justify-content:center;
      font-size:28px; color:#444; transition:all .3s;
    }
    .eq-result.correct { background:linear-gradient(135deg,#56e89d,#3ece6f); border-color:transparent; color:#fff; }
    .eq-result.wrong   { background:linear-gradient(135deg,#ff7b7b,#ff4d6d); border-color:transparent; color:#fff; animation:wrongShake .4s; }
    @keyframes wrongShake {
      0%,100%{transform:translateX(0)} 20%{transform:translateX(-9px)} 40%{transform:translateX(9px)}
      60%{transform:translateX(-6px)} 80%{transform:translateX(6px)}
    }

    /* ── OPERATORS ── */
    .ops-area { display:flex; gap:12px; margin-bottom:18px; justify-content:center; flex-wrap:wrap; }

    .op-btn {
      width:66px; height:66px; border-radius:18px; font-size:28px;
      border:none; cursor:pointer; background:#fff; color:#333;
      box-shadow:0 6px 0 rgba(0,0,0,.15);
      transition:transform .1s, box-shadow .1s, opacity .2s;
      font-family:'Fredoka One';
    }
    .op-btn:active { transform:translateY(5px); box-shadow:0 1px 0 rgba(0,0,0,.15); }
    .op-btn.dim     { opacity:.35; pointer-events:none; }
    .op-btn.highlight { border:3px solid var(--blue); box-shadow:0 6px 0 rgba(67,97,238,.45); }

    /* ── ACTION BUTTONS ── */
    .action-row { display:flex; gap:12px; justify-content:center; flex-wrap:wrap; }

    .act-btn {
      padding:12px 26px; font-size:17px; font-family:'Fredoka One';
      border:none; border-radius:14px; cursor:pointer;
      transition:transform .1s, box-shadow .1s;
    }
    .act-btn:active { transform:translateY(3px); }
    .btn-rst  { background:linear-gradient(135deg,#aaa,#888); color:#fff; box-shadow:0 5px 0 #555; }
    .btn-rst:active  { box-shadow:0 1px 0 #555; }
    .btn-chg  { background:linear-gradient(135deg,#b98eff,#9b5de5); color:#fff; box-shadow:0 5px 0 #5a1aaa; }
    .btn-chg:active  { box-shadow:0 1px 0 #5a1aaa; }
    .btn-chg:disabled { opacity:.38; cursor:not-allowed; transform:none; }

    /* ── 2P SCREEN ── */
    #twoPlayerScreen { padding:0; background:var(--bg); }

    .p-area {
      flex:1; display:flex; flex-direction:column;
      align-items:center; justify-content:center;
      padding:14px 16px; width:100%;
    }
    .p-area.p2 { transform:rotate(180deg); }

    .p-hdr {
      display:flex; align-items:center; justify-content:space-between;
      width:100%; max-width:520px; margin-bottom:10px; gap:10px;
    }

    .p-label {
      font-size:22px; padding:6px 22px; border-radius:12px; color:#fff;
    }
    .p1 .p-label { background:linear-gradient(135deg,#ff7b7b,#ff4d6d); box-shadow:0 4px 0 #b00025; }
    .p2 .p-label { background:linear-gradient(135deg,#4cc9f0,#4361ee); box-shadow:0 4px 0 #1a2aaa; }

    .win-dots { display:flex; gap:8px; align-items:center; }
    .win-dot {
      width:20px; height:20px; border-radius:50%;
      border:3px solid #ddd; background:white; transition:all .3s;
    }
    .win-dot.on-p1 { background:#ff4d6d; border-color:#ff4d6d; }
    .win-dot.on-p2 { background:#4361ee; border-color:#4361ee; }

    .p-status {
      font-size:14px; font-family:'Noto Sans JP'; color:#aaa;
      text-align:center; min-height:20px; margin-bottom:8px;
    }
    .p-status.go { color:var(--green); animation:statusBounce .6s ease-in-out infinite alternate; }
    @keyframes statusBounce { from{transform:scale(1)} to{transform:scale(1.06)} }

    .divider-2p {
      height:48px; flex-shrink:0; width:100%;
      background:linear-gradient(90deg,#ff4d6d,#9b5de5,#4361ee);
      display:flex; align-items:center; justify-content:center;
    }

    .divider-home-btn {
      padding:6px 20px; font-size:16px; font-family:'Fredoka One',sans-serif;
      background:rgba(255,255,255,.92); color:#444;
      border:none; border-radius:20px; cursor:pointer;
      box-shadow:0 2px 8px rgba(0,0,0,.20);
      transition:transform .1s, box-shadow .1s;
    }
    .divider-home-btn:active { transform:translateY(2px); box-shadow:0 1px 4px rgba(0,0,0,.15); }

    /* ── RESULT / 2P-RESULT ── */
    #resultScreen, #result2p { background:var(--bg); }

    .result-title { font-size:52px; color:var(--orange); margin-bottom:14px; text-shadow:0 4px 0 rgba(0,0,0,.08); }
    .result-score { font-size:24px; color:#555; font-family:'Noto Sans JP'; margin-bottom:6px; }
    .result-hs    { font-size:18px; color:var(--orange); margin-bottom:32px; }

    .winner-big { font-size:54px; text-align:center; margin-bottom:14px; }
    .winner-big.p1w { color:#ff4d6d; }
    .winner-big.p2w { color:#4361ee; }
    .final-scores { font-size:20px; color:#555; font-family:'Noto Sans JP'; margin-bottom:28px; }

    .res-btn {
      padding:16px 50px; font-size:22px; font-family:'Fredoka One';
      border:none; border-radius:20px; cursor:pointer; margin:8px;
      transition:transform .1s, box-shadow .1s;
    }
    .res-btn:active { transform:translateY(5px); }
    .res-retry { background:linear-gradient(135deg,#ff7b7b,#ff4d6d); color:#fff; box-shadow:0 7px 0 #b00025; }
    .res-retry:active { box-shadow:0 2px 0 #b00025; }
    .res-menu  { background:#fff; color:#888; border:2px solid #ddd; box-shadow:0 5px 0 #ccc; }
    .res-menu:active  { box-shadow:0 1px 0 #ccc; }

    /* ── CONFETTI ── */
    .confetti-wrap { position:fixed; inset:0; pointer-events:none; z-index:9999; overflow:hidden; }
    .cp {
      position:absolute; top:-12px;
      animation:cpFall linear forwards;
    }
    @keyframes cpFall { to { transform:translateY(110vh) rotate(900deg); opacity:0; } }

    /* ── TOAST ── */
    #toast {
      position:fixed; top:50%; left:50%;
      transform:translate(-50%,-50%) scale(.8);
      background:rgba(20,20,20,.78); color:#fff;
      padding:18px 40px; border-radius:22px; font-size:30px;
      opacity:0; transition:all .25s; pointer-events:none; z-index:1000;
    }
    #toast.show { opacity:1; transform:translate(-50%,-50%) scale(1); }

    /* ── RESPONSIVE ── */
    @media (max-width:480px) {
      .num-tile { width:62px; height:62px; font-size:30px; }
      .slot { width:48px; height:48px; font-size:22px; }
      .op-btn { width:58px; height:58px; font-size:24px; }
    }
  </style>
</head>
<body>

<div class="confetti-wrap" id="confettiWrap"></div>
<div id="toast"></div>

<!-- ═══ HOME ═══ -->
<div class="screen active" id="homeScreen">
  <div class="home-logo">
    <span class="logo-make">MAKE</span><span class="logo-10"> 10</span>
  </div>
  <p class="home-sub">4つの数字で10をつくろう！</p>
  <div class="mode-btns">
    <button class="mode-btn btn-solo" onclick="startSolo()">🕐 1人で遊ぶ</button>
    <button class="mode-btn btn-2p"   onclick="show2PSetup()">👥 2人対戦</button>
  </div>
  <div class="hs-display">ハイスコア：<span class="hs-num" id="homeHS">0</span> 問</div>

<!-- ═══ 2P SETUP ═══ -->
<div class="screen" id="setupScreen">
  <div class="setup-title">2人対戦 設定</div>
  <div class="setup-lbl">何本先取？</div>
  <div class="rounds-row" id="roundsRow">
    <button class="rnd-btn sel" onclick="selectRounds(1)">1</button>
    <button class="rnd-btn"     onclick="selectRounds(2)">2</button>
    <button class="rnd-btn"     onclick="selectRounds(3)">3</button>

<!-- ═══ SOLO ═══ -->
<div class="screen" id="soloScreen">
  <div class="solo-hdr">
    <div class="timer-box" id="soloTimer">60</div>
    <div class="score-box">
      <span class="score-lbl">せいかい</span>
      <span id="soloScore">0</span>
    </div>
    <button class="home-icon-btn" onclick="goHome()">🏠</button>
  </div>
  <div class="nums-area"   id="soloNums"></div>
  <div class="eq-area"     id="soloEq"></div>
  <div class="ops-area"    id="soloOps"></div>
  <div class="action-row">
    <button class="act-btn btn-rst" onclick="resetEq('solo')">やり直し</button>

  <!-- P2 top (rotated) -->
  <div class="p-area p2" id="p2Area">

    <div class="eq-area"   id="p2Eq"></div>
    <div class="ops-area"  id="p2Ops"></div>
    <div class="action-row">
      <button class="act-btn btn-rst" onclick="resetEq('p2')">やり直し</button>
    </div>
  </div>

  <div class="divider-2p">
    <button class="divider-home-btn" onclick="showScreen('homeScreen')">🏠 ホーム</button>
  </div>

  <!-- P1 bottom -->
  <div class="p-area p1" id="p1Area">
    <div class="p-hdr">
      <div class="p-label">P1</div>
      <div class="win-dots" id="p1Dots"></div>
    </div>
    <div class="p-status go" id="p1Status">こたえを入力してね！</div>
    <div class="nums-area" id="p1Nums"></div>
    <div class="eq-area"   id="p1Eq"></div>
    <div class="ops-area"  id="p1Ops"></div>
    <div class="action-row">
      <button class="act-btn btn-rst" onclick="resetEq('p1')">やり直し</button>

<!-- ═══ SOLO RESULT ═══ -->
<div class="screen" id="resultScreen">
  <div class="result-title">⏰ タイムアップ！</div>
  <div class="result-score">せいかい数：<strong id="finalScore">0</strong> 問</div>
  <div class="result-hs" id="resultHS"></div>
  <div>
    <button class="res-btn res-retry" onclick="startSolo()">もう一度！</button>

  </div>
</div>

<!-- ═══ 2P RESULT ═══ -->
<div class="screen" id="result2p">
  <div class="winner-big" id="winnerBig"></div>
  <div class="final-scores" id="finalScores2p"></div>
  <div>
    <button class="res-btn res-retry" onclick="start2P()">もう一度！</button>
    <button class="res-btn res-menu"  onclick="showScreen('homeScreen')">メニューへ</button>
  </div>
</div>

<script>
// ══════════════════════════════════════════
//  CORE: evaluate expression (no parens)
// ══════════════════════════════════════════
const OPS = ['+', '-', '×', '÷'];

function evalExpr(nums, ops) {
  let ns = nums.map(Number);
  let os = [...ops];
  let i = 0;
  while (i < os.length) {
    if (os[i] === '×' || os[i] === '÷') {
      const r = os[i] === '×' ? ns[i] * ns[i+1]
                               : (ns[i+1] === 0 ? null : ns[i] / ns[i+1]);
      if (r === null) return null;
      ns.splice(i, 2, r);
      os.splice(i, 1);
    } else i++;
  }
  let t = ns[0];
  for (let j = 0; j < os.length; j++)
    t = os[j] === '+' ? t + ns[j+1] : t - ns[j+1];
  return t;
}

function permutations(a) {
  if (a.length <= 1) return [a];
  const r = [];
  for (let i = 0; i < a.length; i++) {
    const rest = permutations([...a.slice(0,i), ...a.slice(i+1)]);
    for (const p of rest) r.push([a[i], ...p]);
  }
  return r;
}

function hasSolution(nums) {
  for (const perm of permutations(nums))
    for (const o1 of OPS) for (const o2 of OPS) for (const o3 of OPS) {
      const v = evalExpr(perm, [o1, o2, o3]);
      if (v !== null && Math.abs(v - 10) < 1e-9) return true;
    }
  return false;
}

function genProblem() {
  let nums, tries = 0;
  do {
    nums = Array.from({length:4}, () => Math.floor(Math.random()*9)+1);
    tries++;
  } while (!hasSolution(nums) && tries < 2000);
  return nums;
}

// ══════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════
const BLANK = () => Array(7).fill(null);

const solo = {
  nums:[], slots:BLANK(), used:[], cur:0,
  score:0, timeLeft:60, timer:null, chgUsed:false,
};

const two = {
  nums:[],
  p1:{ slots:BLANK(), used:[], cur:0, score:0 },
  p2:{ slots:BLANK(), used:[], cur:0, score:0 },
  target:3, locked: { p1:false, p2:false },
};

let highScore = parseInt(localStorage.getItem('make10_hs') || '0');

// ══════════════════════════════════════════
//  HELPERS
// ══════════════════════════════════════════
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function updateHomeHS() {
  document.getElementById('homeHS').textContent = highScore;
}

let toastTimer;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 1200);
}

function confetti() {
  const wrap = document.getElementById('confettiWrap');
  const colors = ['#ff4d6d','#ffbe0b','#3ece6f','#4361ee','#9b5de5','#ff7c38','#4cc9f0'];
  for (let i = 0; i < 70; i++) {
    const p = document.createElement('div');
    p.className = 'cp';
    const sz = 6 + Math.random()*10;
    const circle = Math.random() > .45;
    p.style.cssText = `
      left:${Math.random()*100}%;
      width:${sz}px; height:${sz}px;
      background:${colors[Math.floor(Math.random()*colors.length)]};
      border-radius:${circle ? '50%' : '3px'};
      animation-duration:${1.4+Math.random()*2}s;
      animation-delay:${Math.random()*.6}s;
    `;
    wrap.appendChild(p);
    setTimeout(() => p.remove(), 3500);
  }
}

function calcResult(slots) {
  if (slots[6] === null) return null;
  return evalExpr([slots[0].v, slots[2].v, slots[4].v, slots[6].v],
                  [slots[1], slots[3], slots[5]]);
}

// ══════════════════════════════════════════
//  RENDER HELPERS
// ══════════════════════════════════════════
function renderNums(containerId, nums, used, onClick) {
  const c = document.getElementById(containerId);
  c.innerHTML = '';
  nums.forEach((n, i) => {
    const t = document.createElement('div');
    t.className = 'num-tile' + (used.includes(i) ? ' used' : '');
    t.dataset.c = i % 4;
    t.textContent = n;
    t.onclick = () => onClick(i);
    c.appendChild(t);
  });
}

function renderEq(containerId, slots, cur) {
  const c = document.getElementById(containerId);
  c.innerHTML = '';
  for (let i = 0; i < 7; i++) {
    const s = document.createElement('div');
    const isN = i % 2 === 0;
    s.className = 'slot ' + (isN ? 'ns' : 'os');
    if (i === cur) s.classList.add('active');
    if (slots[i] !== null) {
      s.classList.add('filled');
      if (isN) { s.dataset.c = slots[i].si % 4; s.textContent = slots[i].v; }
      else s.textContent = slots[i];
    }
    c.appendChild(s);
  }
  const eq = document.createElement('span');
  eq.className = 'eq-equals'; eq.textContent = '=';
  c.appendChild(eq);

  const res = document.createElement('div');
  res.className = 'eq-result';
  const v = calcResult(slots);
  if (v !== null) {
    res.textContent = Number.isInteger(v) ? v : v.toFixed(2);
    if (Math.abs(v - 10) < 1e-9) res.classList.add('correct');
  } else res.textContent = '?';
  c.appendChild(res);
}

function renderOps(containerId, cur, onClick) {
  const c = document.getElementById(containerId);
  c.innerHTML = '';
  const needsOp = cur % 2 === 1 && cur < 7;
  OPS.forEach(op => {
    const b = document.createElement('button');
    b.className = 'op-btn' + (needsOp ? ' highlight' : ' dim');
    b.textContent = op;
    b.onclick = () => onClick(op);
    c.appendChild(b);
  });
}

// ══════════════════════════════════════════
//  SOLO
// ══════════════════════════════════════════
function startSolo() {
  clearInterval(solo.timer);
  Object.assign(solo, { score:0, timeLeft:60, chgUsed:false });
  showScreen('soloScreen');
  document.getElementById('soloScore').textContent = '0';
  newSoloQ();
  solo.timer = setInterval(() => {
    solo.timeLeft--;
    const el = document.getElementById('soloTimer');
    el.textContent = solo.timeLeft;
    el.className = 'timer-box' + (solo.timeLeft <= 10 ? ' danger' : solo.timeLeft <= 20 ? ' warn' : '');
    if (solo.timeLeft <= 0) { clearInterval(solo.timer); endSolo(); }
  }, 1000);
}

function newSoloQ() {
  solo.nums = genProblem();
  solo.slots = BLANK(); solo.used = []; solo.cur = 0;
  document.getElementById('chgBtn').disabled = solo.chgUsed;
  renderSolo();
}

function renderSolo() {
  renderNums('soloNums', solo.nums, solo.used, i => soloPickNum(i));
  renderEq('soloEq', solo.slots, solo.cur);
  renderOps('soloOps', solo.cur, op => soloPickOp(op));
}

function soloPickNum(i) {
  if (solo.cur % 2 !== 0 || solo.used.includes(i) || solo.cur >= 7) return;
  solo.slots[solo.cur] = { v: solo.nums[i], si: i };
  solo.used.push(i);
  solo.cur++;
  if (solo.cur === 7) soloCheckResult();
  else renderSolo();
}

function soloPickOp(op) {
  if (solo.cur % 2 !== 1 || solo.cur >= 7) return;
  solo.slots[solo.cur] = op;
  solo.cur++;
  renderSolo();
}

function soloCheckResult() {
  renderSolo();
  const v = calcResult(solo.slots);
  if (v !== null && Math.abs(v - 10) < 1e-9) {
    solo.score++;
    document.getElementById('soloScore').textContent = solo.score;
    confetti();
    toast('せいかい！ 🎉');
    setTimeout(() => newSoloQ(), 800);
  } else {
    toast('ちがう... ❌');
    setTimeout(() => resetEq('solo'), 700);
  }
}

function resetEq(who) {
  if (who === 'solo') {
    solo.slots = BLANK(); solo.used = []; solo.cur = 0;
    renderSolo();
  } else {
    const p = two[who];
    p.slots = BLANK(); p.used = []; p.cur = 0;
    if (who === 'p1') renderP1(); else renderP2();
  }
}

function changeQ() {
  if (solo.chgUsed) return;
  newSoloQ();
  solo.chgUsed = true;
  document.getElementById('chgBtn').disabled = true;
}

function endSolo() {
  const sc = solo.score;
  let newRec = false;
  if (sc > highScore) { highScore = sc; localStorage.setItem('make10_hs', highScore); newRec = true; }
  document.getElementById('finalScore').textContent = sc;
  document.getElementById('resultHS').textContent = newRec
    ? '🏆 新記録！ハイスコア：' + highScore + '問'
    : 'ハイスコア：' + highScore + '問';
  updateHomeHS();
  showScreen('resultScreen');
}

function goHome() {
  clearInterval(solo.timer);
  updateHomeHS();
  showScreen('homeScreen');
}

// ══════════════════════════════════════════
//  2P SETUP
// ══════════════════════════════════════════
let targetRounds = 1;

function show2PSetup() { showScreen('setupScreen'); selectRounds(1); }

function selectRounds(n) {
  targetRounds = n;
  document.querySelectorAll('.rnd-btn').forEach((b, i) =>
    b.classList.toggle('sel', i + 1 === n));
}

function start2P() {
  two.target = targetRounds;
  two.p1.score = 0; two.p2.score = 0;
  showScreen('twoPlayerScreen');
  updateDots();
  document.getElementById('p1ScoreDisplay') && (document.getElementById('p1ScoreDisplay').textContent = '0');
  document.getElementById('p2ScoreDisplay') && (document.getElementById('p2ScoreDisplay').textContent = '0');
  new2PQ();
}

function new2PQ() {
  two.nums = genProblem();
  two.locked = { p1:false, p2:false };
  ['p1','p2'].forEach(p => { two[p].slots = BLANK(); two[p].used = []; two[p].cur = 0; });
  renderP1(); renderP2();
  document.getElementById('p1Status').className = 'p-status go';
  document.getElementById('p1Status').textContent = 'こたえを入力してね！';
  document.getElementById('p2Status').className = 'p-status go';
  document.getElementById('p2Status').textContent = 'こたえを入力してね！';
}

function renderP1() {
  const p = two.p1;
  renderNums('p1Nums', two.nums, p.used, i => twoPickNum('p1', i));
  renderEq('p1Eq', p.slots, p.cur);
  renderOps('p1Ops', p.cur, op => twoPickOp('p1', op));
}

function renderP2() {
  const p = two.p2;
  renderNums('p2Nums', two.nums, p.used, i => twoPickNum('p2', i));
  renderEq('p2Eq', p.slots, p.cur);
  renderOps('p2Ops', p.cur, op => twoPickOp('p2', op));
}

function twoPickNum(who, i) {
  const p = two[who];
  if (two.locked[who] || p.cur % 2 !== 0 || p.used.includes(i) || p.cur >= 7) return;
  p.slots[p.cur] = { v: two.nums[i], si: i };
  p.used.push(i);
  p.cur++;
  if (p.cur === 7) twoCheck(who);
  else { if (who==='p1') renderP1(); else renderP2(); }
}

function twoPickOp(who, op) {
  const p = two[who];
  if (two.locked[who] || p.cur % 2 !== 1 || p.cur >= 7) return;
  p.slots[p.cur] = op;
  p.cur++;
  if (who==='p1') renderP1(); else renderP2();
}

function twoCheck(who) {
  if (who==='p1') renderP1(); else renderP2();
  const v = calcResult(two[who].slots);
  if (v !== null && Math.abs(v - 10) < 1e-9) {
    two.locked[who] = true;
    two[who].score++;
    updateDots();
    confetti();
    toast((who==='p1'?'P1':'P2') + ' せいかい！ 🎉');
    const statusEl = document.getElementById(who + 'Status');
    statusEl.className = 'p-status';
    statusEl.textContent = '✅ せいかい！';
    const other = who === 'p1' ? 'p2' : 'p1';
    two.locked[other] = true;
    document.getElementById(other+'Status').className = 'p-status';
    document.getElementById(other+'Status').textContent = '負け...';

    if (two[who].score >= two.target) {
      setTimeout(() => show2PResult(who), 1100);
    } else {
      setTimeout(() => new2PQ(), 1400);
    }
  } else {
    toast('ちがう... ❌');
    setTimeout(() => resetEq(who), 700);
  }
}

function updateDots() {
  ['p1','p2'].forEach(p => {
    const el = document.getElementById(p + 'Dots');
    el.innerHTML = '';
    for (let i = 0; i < two.target; i++) {
      const d = document.createElement('div');
      d.className = 'win-dot' + (i < two[p].score ? ` on-${p}` : '');
      el.appendChild(d);
    }
  });
}

function show2PResult(winner) {
  const big = document.getElementById('winnerBig');
  big.className = 'winner-big ' + (winner==='p1' ? 'p1w' : 'p2w');
  big.textContent = (winner==='p1' ? 'P1' : 'P2') + ' の勝ち！ 🏆';
  document.getElementById('finalScores2p').textContent =
    `P1: ${two.p1.score}勝 ／ P2: ${two.p2.score}勝`;
  confetti();
  showScreen('result2p');
}

// ══════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════
updateHomeHS();
</script>
